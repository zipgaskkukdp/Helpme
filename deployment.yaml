apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-sample-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-sample-app
  template:
    metadata:
      labels:
        app: my-sample-app
  spec:
    containers:
    - name: my-sample-app
      # 이 부분은 추후 GitHub Actions가 자동으로 ECR 주소로 바꿀 예정입니다.
      image: 904053119728.dkr.ecr.ap-northeast-2.amazonaws.com/my-sample-app:72d1e1675d11bcf3fcb00838cc9e8bb24066e3b3
      ports:
      - containerPort: 3000