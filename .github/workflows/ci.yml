name: Build and Push to ECR

on:
  push:
    branches: [ "main" ]

permissions:
  id-token: write
  contents: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 내 코드 가져오기 (Checkout)
        uses: actions/checkout@v3

      - name: 2. AWS 자격 증명 설정 (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # 👇 여기에 아까 복사해둔 본인의 IAM 역할 ARN을 꼭 적어주세요!
          role-to-assume: arn:aws:iam::904053119728:role/GitHubActions-ECR-Role
          aws-region: ap-northeast-2

      - name: 3. AWS ECR 로그인
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: 4. Docker 이미지 빌드 및 ECR 푸시
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          # 👇 여기에 아까 만든 ECR 리포지토리 이름을 확인 후 맞춰주세요!
          ECR_REPOSITORY: my-sample-app
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
      
      - name: 5. deployment.yaml 파일에 이미지 주소 업데이트
        run: |
          # ECR 주소와 방금 만든 이미지 태그를 조합해서 변수에 담습니다.
          NEW_IMAGE="${{ steps.login-ecr.outputs.registry }}/my-sample-app:${{ github.sha }}"
          
          # 리눅스의 sed 명령어를 사용해 'IMAGE_PLACEHOLDER' 글자를 진짜 주소로 바꿔치기합니다.
          sed -i "s|IMAGE_PLACEHOLDER|$NEW_IMAGE|g" deployment.yaml
          
      - name: 6. 변경된 명세서를 GitHub에 다시 Push (자동화)
        run: |
          # 로봇(GitHub Actions)의 이름과 이메일을 설정합니다.
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 변경된 deployment.yaml 파일을 포장해서 올립니다.
          git add deployment.yaml
          git commit -m "🚀 자동 업데이트: 이미지 태그 변경 (${{ github.sha }})"
          git push